<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Italie Shop | Administration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        /* Thème Italie Shop : Rouge */
        .request-card { background: white; border-radius: 12px; border-left: 5px solid #dc3545; transition: 0.3s; }
        .tab-active { border-bottom: 3px solid #dc3545; color: #dc3545; font-weight: 900; }
    </style>
</head>
<body class="p-4 pb-20">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-black text-slate-800 uppercase italic">Admin Italie Shop</h1>
        <button onclick="location.reload()" class="text-[#dc3545] active:rotate-180 transition-transform">
            <i class="fa-solid fa-rotate"></i>
        </button>
    </div>

    <div class="flex justify-around mb-6 border-b border-slate-200 bg-white rounded-t-xl">
        <button onclick="showSection('recharges')" id="tab-recharges" class="flex-1 py-4 text-[10px] uppercase font-bold tab-active">Recharges</button>
        <button onclick="showSection('retraits')" id="tab-retraits" class="flex-1 py-4 text-[10px] uppercase font-bold">Retraits</button>
    </div>

    <div id="list-container" class="space-y-4">
        <p class="text-center text-slate-400 py-10 italic">Chargement des demandes...</p>
    </div>

    <script>
        const BASE_URL = "https://alibaba-f22a0-default-rtdb.firebaseio.com";
        // On initialise sur le dossier correct utilisé par vos règles
        let currentTab = 'recharges_en_attente';

        function showSection(type) {
            // Mise à jour du chemin Firebase selon l'onglet
            currentTab = (type === 'recharges') ? 'recharges_en_attente' : 'retraits_en_attente';
            
            document.getElementById('tab-recharges').classList.remove('tab-active');
            document.getElementById('tab-retraits').classList.remove('tab-active');
            
            // Activation visuelle de l'onglet cliqué
            document.getElementById('tab-' + type).classList.add('tab-active');
            fetchRequests();
        }

        async function fetchRequests() {
            const listDiv = document.getElementById('list-container');
            
            try {
                const res = await fetch(`${BASE_URL}/${currentTab}.json`);
                const data = await res.json();
                
                if (!data) {
                    listDiv.innerHTML = `<div class="text-center py-20 opacity-40"><i class="fa-solid fa-box-open text-4xl mb-2"></i><p>Aucune demande dans ${currentTab}</p></div>`;
                    return;
                }

                listDiv.innerHTML = Object.keys(data).map(id => {
                    const req = data[id];
                    // Gestion flexible des noms de champs (phone, userAccount ou user)
                    const clientPhone = req.phone || req.userAccount || req.user || 'Inconnu';
                    const montantReq = req.montant || req.amount || 0;
                    const expediteur = req.expediteur || req.receiverPhone || 'N/A';

                    return `
                        <div id="card-${id}" class="request-card p-4 shadow-sm border-l-4 ${currentTab.includes('recharge') ? 'border-green-500' : 'border-red-500'}">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="font-black text-slate-800 text-sm">Client: +${clientPhone}</p>
                                    <p class="text-[10px] text-slate-500 font-bold">Détail: ${expediteur}</p>
                                    <p class="text-[9px] text-slate-400 italic">${req.date || ''}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-lg font-black text-slate-900">FC ${montantReq.toLocaleString()}</p>
                                    <p class="text-[9px] font-bold text-[#dc3545] uppercase">${req.reseau || req.network || 'Transfert'}</p>
                                </div>
                            </div>
                            
                            <div class="flex gap-2 mt-4 pt-3 border-t border-slate-50">
                                <button onclick="processRequest('valider', '${id}', '${clientPhone}', ${montantReq})" 
                                        class="flex-1 bg-green-600 text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all">
                                    Valider
                                </button>
                                <button onclick="processRequest('rejeter', '${id}', '${clientPhone}', ${montantReq})" 
                                        class="flex-1 bg-red-50 text-red-600 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all">
                                    Rejeter
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error("Erreur Firebase:", e);
                listDiv.innerHTML = "<p class='text-center text-red-500 font-bold'>Erreur de connexion Firebase</p>";
            }
        }

        async function processRequest(action, id, phone, montant) {
            const confirmMsg = action === 'valider' ? `Approuver FC ${montant} pour +${phone} ?` : `Rejeter cette demande ?`;
            if (!confirm(confirmMsg)) return;

            try {
                // Si c'est une recharge validée, on crédite le solde de l'utilisateur
                if (action === 'valider' && currentTab.includes('recharge')) {
                    const userRes = await fetch(`${BASE_URL}/users/${phone}.json`);
                    const user = await userRes.json();

                    if (user) {
                        const nouveauSolde = (parseFloat(user.balance) || 0) + parseFloat(montant);
                        await fetch(`${BASE_URL}/users/${phone}.json`, {
                            method: 'PATCH',
                            body: JSON.stringify({ balance: nouveauSolde })
                        });
                    }
                }
                
                // On supprime la demande traitée
                await fetch(`${BASE_URL}/${currentTab}/${id}.json`, { method: 'DELETE' });

                // Animation de sortie de la carte
                const card = document.getElementById(`card-${id}`);
                if (card) {
                    card.style.opacity = '0';
                    card.style.transform = 'translateX(100px)';
                    setTimeout(() => { fetchRequests(); }, 300);
                }

            } catch (e) {
                alert("Erreur lors de l'opération.");
                console.error(e);
            }
        }

        // Chargement initial
        window.onload = fetchRequests;
    </script>
</body>
</html>
